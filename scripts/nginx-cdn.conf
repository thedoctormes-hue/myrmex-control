# ============================================================
# BL-025: Nginx конфигурация для CDN и VPN-совместимости
# Размещение: /etc/nginx/snippets/myrmex-cdn.conf
# Подключение: include snippets/myrmex-cdn.conf;
# ============================================================

# --- CDN / Proxy headers ---
# Корректная работа за CDN (CloudFlare, etc.) и VPN (XRAY/VLESS)
proxy_set_header Host $host;
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header X-Forwarded-Host $host;
proxy_set_header X-Forwarded-Port $server_port;

# --- WebSocket поддержка (для future real-time) ---
proxy_http_version 1.1;
proxy_set_header Upgrade $http_upgrade;
proxy_set_header Connection "upgrade";

# --- Timeouts (важно для VPN с высоким latency) ---
proxy_connect_timeout 30s;
proxy_send_timeout 60s;
proxy_read_timeout 60s;

# --- Buffer ---
proxy_buffering on;
proxy_buffer_size 4k;
proxy_buffers 8 4k;

# --- Статические файлы — CDN-кэширование ---
location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot|webp|avif)$ {
    expires 30d;
    add_header Cache-Control "public, immutable";
    add_header X-Content-Type-Options "nosniff";
    access_log off;
}

# --- index.html — без кэширования (для обновлений) ---
location = /index.html {
    expires -1;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Pragma "no-cache";
}

# --- API — без кэширования ---
location /api/ {
    expires -1;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
}

# --- Gzip / Brotli ---
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_types text/plain text/css application/json application/javascript text/xml application/xml+rss application/atom+xml image/svg+xml;

# --- Security (в дополнение к CSP в приложении) ---
add_header X-Frame-Options "DENY" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
