version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 10
    reviewers:
      - "thedoctormes-hue"
    labels:
      - "dependencies"
      - "npm"
    commit-message:
      prefix: "deps"
      include: "scope"
    groups:
      dev-dependencies:
        patterns:
          - "@types/*"
          - "eslint*"
          - "prettier"
          - "vitest*"
          - "@vitest/*"
          - "typescript"
      frontend:
        patterns:
          - "react"
          - "react-dom"
          - "react-router*"
          - "@vitejs/*"
          - "vite"
          - "tailwindcss"
          - "lucide-react"
      backend:
        patterns:
          - "express"
          - "cors"
          - "cookie-parser"
          - "otpauth"
