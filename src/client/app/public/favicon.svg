<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#0f172a"/>

  <!-- Circuit traces (subtle) -->
  <g stroke="#1e293b" stroke-width="1.5" fill="none">
    <line x1="60" y1="256" x2="120" y2="256"/>
    <line x1="120" y1="256" x2="120" y2="180"/>
    <line x1="120" y1="256" x2="120" y2="332"/>
    <line x1="392" y1="256" x2="452" y2="256"/>
    <line x1="392" y1="256" x2="392" y2="180"/>
    <line x1="392" y1="256" x2="392" y2="332"/>
    <line x1="256" y1="80" x2="256" y2="140"/>
    <line x1="256" y1="372" x2="256" y2="432"/>
    <!-- Cross traces -->
    <line x1="140" y1="160" x2="200" y2="200"/>
    <line x1="312" y1="200" x2="372" y2="160"/>
    <line x1="140" y1="352" x2="200" y2="312"/>
    <line x1="312" y1="312" x2="372" y2="352"/>
  </g>

  <!-- Circuit nodes (small dots at trace junctions) -->
  <g fill="#334155">
    <circle cx="120" cy="256" r="4"/>
    <circle cx="392" cy="256" r="4"/>
    <circle cx="256" cy="140" r="4"/>
    <circle cx="256" cy="372" r="4"/>
    <circle cx="120" cy="180" r="3"/>
    <circle cx="120" cy="332" r="3"/>
    <circle cx="392" cy="180" r="3"/>
    <circle cx="392" cy="332" r="3"/>
  </g>

  <!-- Ant body — top view, geometric, angular -->
  <g filter="url(#glow)">

    <!-- Abdomen (gaster) — large angular oval -->
    <path d="M256 300 L310 270 L340 290 L330 340 L280 360 L240 350 L230 320 Z"
          fill="#f59e0b" opacity="0.95"/>

    <!-- Petiole (waist node) — hexagonal -->
    <polygon points="256,260 270,240 256,220 242,240"
             fill="#f59e0b" opacity="0.9"/>

    <!-- Thorax — angular -->
    <path d="M256 220 L290 195 L300 210 L285 240 L256 250 L225 240 L210 210 L220 195 Z"
          fill="#f59e0b" opacity="0.85"/>

    <!-- Head — angular trapezoid -->
    <path d="M256 150 L280 170 L275 195 L256 205 L237 195 L232 170 Z"
          fill="#f59e0b" opacity="0.9"/>

    <!-- Antennae — angular L-shapes -->
    <path d="M237 170 L200 130 L185 135" stroke="#f59e0b" stroke-width="4" stroke-linecap="round" fill="none"/>
    <path d="M275 170 L312 130 L327 135" stroke="#f59e0b" stroke-width="4" stroke-linecap="round" fill="none"/>

    <!-- Antenna tips (nodes) -->
    <circle cx="185" cy="135" r="5" fill="#f59e0b"/>
    <circle cx="327" cy="135" r="5" fill="#f59e0b"/>

    <!-- Legs — 3 pairs, angular, extending outward -->
    <!-- Front legs -->
    <path d="M220 195 L170 175 L150 185" stroke="#f59e0b" stroke-width="3.5" stroke-linecap="round" fill="none"/>
    <path d="M290 195 L340 175 L360 185" stroke="#f59e0b" stroke-width="3.5" stroke-linecap="round" fill="none"/>

    <!-- Middle legs -->
    <path d="M210 230 L155 235 L135 225" stroke="#f59e0b" stroke-width="3.5" stroke-linecap="round" fill="none"/>
    <path d="M300 230 L355 235 L375 225" stroke="#f59e0b" stroke-width="3.5" stroke-linecap="round" fill="none"/>

    <!-- Back legs -->
    <path d="M230 270 L180 290 L160 280" stroke="#f59e0b" stroke-width="3.5" stroke-linecap="round" fill="none"/>
    <path d="M285 270 L335 290 L355 280" stroke="#f59e0b" stroke-width="3.5" stroke-linecap="round" fill="none"/>

    <!-- Leg tip nodes -->
    <circle cx="150" cy="185" r="4" fill="#f59e0b" opacity="0.8"/>
    <circle cx="360" cy="185" r="4" fill="#f59e0b" opacity="0.8"/>
    <circle cx="135" cy="225" r="4" fill="#f59e0b" opacity="0.8"/>
    <circle cx="375" cy="225" r="4" fill="#f59e0b" opacity="0.8"/>
    <circle cx="160" cy="280" r="4" fill="#f59e0b" opacity="0.8"/>
    <circle cx="355" cy="280" r="4" fill="#f59e0b" opacity="0.8"/>

    <!-- Mandibles -->
    <path d="M245 155 L230 140 L225 145" stroke="#f59e0b" stroke-width="3" stroke-linecap="round" fill="none"/>
    <path d="M267 155 L282 140 L287 145" stroke="#f59e0b" stroke-width="3" stroke-linecap="round" fill="none"/>

    <!-- Eyes -->
    <circle cx="245" cy="178" r="5" fill="#0f172a"/>
    <circle cx="267" cy="178" r="5" fill="#0f172a"/>
    <circle cx="245" cy="178" r="2.5" fill="#f59e0b" opacity="0.6"/>
    <circle cx="267" cy="178" r="2.5" fill="#f59e0b" opacity="0.6"/>

    <!-- Network topology hint — subtle connection lines from ant to corners -->
    <g stroke="#f59e0b" stroke-width="0.8" opacity="0.25" fill="none">
      <line x1="150" y1="185" x2="80" y2="80"/>
      <line x1="360" y1="185" x2="432" y2="80"/>
      <line x1="135" y1="225" x2="80" y2="432"/>
      <line x1="375" y1="225" x2="432" y2="432"/>
    </g>

    <!-- Corner network nodes -->
    <g fill="#f59e0b" opacity="0.2">
      <circle cx="80" cy="80" r="6"/>
      <circle cx="432" cy="80" r="6"/>
      <circle cx="80" cy="432" r="6"/>
      <circle cx="432" cy="432" r="6"/>
    </g>
  </g>
</svg>
