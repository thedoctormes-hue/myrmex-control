<!DOCTYPE html>
<html lang="ru" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <title>Myrmex Control</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/favicon-256x256.png" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
</head>
<body class="bg-background text-foreground">
  <!-- Telegram Mini App Splash Screen — shown instantly before React loads -->
  <div id="twa-splash" style="position:fixed;inset:0;z-index:99999;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0f172a;transition:opacity 0.4s ease-out;">
    <svg width="120" height="120" viewBox="0 0 512 512" style="animation:twa-pulse 1.5s ease-in-out infinite;">
      <rect width="512" height="512" rx="96" fill="#0f172a"/>
      <g fill="#f59e0b" opacity="0.9">
        <path d="M256 300 L310 270 L340 290 L330 340 L280 360 L240 350 L230 320 Z"/>
        <polygon points="256,260 270,240 256,220 242,240"/>
        <path d="M256 220 L290 195 L300 210 L285 240 L256 250 L225 240 L210 210 L220 195 Z"/>
        <path d="M256 150 L280 170 L275 195 L256 205 L237 195 L232 170 Z"/>
      </g>
      <g stroke="#f59e0b" stroke-width="4" stroke-linecap="round" fill="none">
        <path d="M237 170 L200 130 L185 135"/>
        <path d="M275 170 L312 130 L327 135"/>
        <path d="M220 195 L170 175 L150 185"/>
        <path d="M290 195 L340 175 L360 185"/>
        <path d="M210 230 L155 235 L135 225"/>
        <path d="M300 230 L355 235 L375 225"/>
        <path d="M230 270 L180 290 L160 280"/>
        <path d="M285 270 L335 290 L355 280"/>
      </g>
      <g fill="#f59e0b">
        <circle cx="185" cy="135" r="5"/>
        <circle cx="327" cy="135" r="5"/>
        <circle cx="150" cy="185" r="4"/>
        <circle cx="360" cy="185" r="4"/>
        <circle cx="135" cy="225" r="4"/>
        <circle cx="375" cy="225" r="4"/>
        <circle cx="160" cy="280" r="4"/>
        <circle cx="355" cy="280" r="4"/>
      </g>
    </svg>
    <div style="margin-top:24px;font-family:system-ui,sans-serif;font-size:18px;font-weight:600;color:#f59e0b;letter-spacing:0.05em;">MYRMEX CONTROL</div>
    <div style="margin-top:8px;font-family:system-ui,sans-serif;font-size:13px;color:#64748b;">AI Agent Colony</div>
    <div style="margin-top:20px;width:40px;height:3px;background:#1e293b;border-radius:2px;overflow:hidden;">
      <div style="width:60%;height:100%;background:#f59e0b;border-radius:2px;animation:twa-bar 1.2s ease-in-out infinite;"></div>
    </div>
  </div>
  <style>
    @keyframes twa-pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.85; transform: scale(0.97); }
    }
    @keyframes twa-bar {
      0% { transform: translateX(-80%); }
      50% { transform: translateX(120%); }
      100% { transform: translateX(-80%); }
    }
  </style>
  <div id="root"></div>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script type="module" src="/main.tsx?v=1778403619"></script>
  <!-- Debug: show errors on screen for mobile Safari -->
  <script>
    window.addEventListener('error', function(e) {
      var d = document.createElement('div');
      d.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:99999;background:red;color:white;padding:10px;font-size:14px;word-break:break-all;';
      d.textContent = 'JS ERROR: ' + e.message + ' at ' + e.filename + ':' + e.lineno;
      document.body.appendChild(d);
    });
    window.addEventListener('unhandledrejection', function(e) {
      var d = document.createElement('div');
      d.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:99999;background:orange;color:white;padding:10px;font-size:14px;word-break:break-all;';
      d.textContent = 'PROMISE ERROR: ' + (e.reason?.message || e.reason);
      document.body.appendChild(d);
    });
  </script>
</body>
</html>
